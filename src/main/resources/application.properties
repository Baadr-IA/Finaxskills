spring.application.name=skills-rh

# Disable auto Docker Compose startup (run postgres manually)
spring.docker.compose.enabled=false

# Virtual threads: better throughput for I/O-bound workloads (Java 21+, recommended in production)
spring.threads.virtual.enabled=true

# Datasource — credentials externalized via env vars; dev defaults match docker-compose.yml
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mydb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# OAuth2 Resource Server (Keycloak) — using the shared Finaxys lab realm
app.security.oauth2.issuer-uri=${APP_SECURITY_OAUTH2_ISSUER_URI:https://awskeycloak.lab-finaxys.net/realms/Template-app-Java-angular}
app.security.oauth2.jwk-set-uri=${APP_SECURITY_OAUTH2_JWK_SET_URI:${app.security.oauth2.issuer-uri}/protocol/openid-connect/certs}
app.security.oauth2.audience=${APP_SECURITY_OAUTH2_AUDIENCE:template-app-spring-api}
app.security.oauth2.api-client-id=${APP_SECURITY_OAUTH2_API_CLIENT_ID:template-app-spring-api}

# CORS (comma-separated origins)
app.security.cors.allowed-origins=${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}

# Permission profiles source (JSON today, DB repository can be added later)
app.security.permissions.file=${APP_SECURITY_PERMISSIONS_FILE:classpath:security/permission-profiles.json}

# External quiz generation API
app.quiz-generation.base-url=${APP_QUIZ_GENERATION_BASE_URL:http://localhost:8000}
app.quiz-generation.connect-timeout=${APP_QUIZ_GENERATION_CONNECT_TIMEOUT:2s}
app.quiz-generation.read-timeout=${APP_QUIZ_GENERATION_READ_TIMEOUT:10s}
app.quiz-generation.block-question-count=${APP_QUIZ_GENERATION_BLOCK_QUESTION_COUNT:5}
app.quiz-generation.total-blocks=${APP_QUIZ_GENERATION_TOTAL_BLOCKS:5}
